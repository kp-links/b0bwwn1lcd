<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>リダイレクト中...</title>
  <script>
    (function () {
      var urls = [
        { url: "https://www.amazon.co.jp/s/?keywords=エクオール&ie=UTF8&field-asin=B0BWWN1LCD&rh=i:aps,ssx:relevance", weight: 50 },
        { url: "https://www.amazon.co.jp/s/?keywords=えくおーる+サプリメント&ie=UTF8&field-asin=B0BWWN1LCD&rh=i:aps,ssx:relevance", weight: 30 },
        { url: "https://www.amazon.co.jp/s/?keywords=エクオール+サプリ&ie=UTF8&field-asin=B0BWWN1LCD&rh=i:aps,ssx:relevance", weight: 10 },
        { url: "https://www.amazon.co.jp/s/?keywords=イソフラボン+サプリ&ie=UTF8&field-asin=B0BWWN1LCD&rh=i:aps,ssx:relevance", weight: 10 }
      ];
      var rand = Math.random() * 100;
      var cumulative = 0;
      for (var i = 0; i < urls.length; i++) {
        cumulative += urls[i].weight;
        if (rand < cumulative) {
          window.location.replace(urls[i].url);
          break;
        }
      }
    })();
  </script>
</head>
<body><p>リダイレクト中...</p></body>
</html>
